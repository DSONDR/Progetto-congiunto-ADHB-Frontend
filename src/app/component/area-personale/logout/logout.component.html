<!-- Wrapper principale per la modale di conferma del logout -->
<div class="confirm-wrapper">
  
  <!-- Domanda di conferma per l'utente -->
  <h2 class="confirm-question">Vuoi davvero uscire e terminare questa sessione?</h2>

  <!-- Contenitore delle azioni di conferma o annullamento -->
  <div class="confirm-actions">
    
    <!-- Pulsante per confermare il logout -->
    <div class="gray-box" (click)="confermaLogout()">
      Si, Logout
    </div>

    <!-- Pulsante per annullare l'operazione -->
    <div class="gray-box" (click)="annulla()">
      Annulla
    </div>

  </div>

</div>
