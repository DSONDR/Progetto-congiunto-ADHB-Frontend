<section>
  <h2>Usa Abbonamento</h2>
  <table>
    <thead>
      <tr>
        <th>Id</th>
        <th>Sottoscrizione</th>
        <th>Attività</th>
        <th>Data Utilizzo</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let usaAbb of usaAbbonamenti">
        <td>{{ usaAbb.id }}</td>
        <td>{{ usaAbb.sottoscrizione?.id }}</td>
        <td>{{ usaAbb.attivita?.nomeAtt }}</td>
        <td>{{ usaAbb.dataUtilizzo }}</td>
      </tr>
    </tbody>
  </table>
</section>
